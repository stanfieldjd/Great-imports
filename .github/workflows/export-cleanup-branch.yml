name: Export cleanup branch

on:
  push:
    branches:
      - cleanup/1.1.1-purge
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package repository
        run: tar --exclude=.git -czf /tmp/repository.tar.gz .
      - name: Upload repository archive
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-branch-source
          path: /tmp/repository.tar.gz
          if-no-files-found: error
          retention-days: 1
